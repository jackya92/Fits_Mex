    <script>
        async function cargarRutinas() {
            const lista = document.getElementById("lista-rutinas");
            lista.innerHTML = "<p class='text-center text-gray-500 mt-8'>Cargando rutinas...</p>";

            try {
                const res = await fetch("php/Mostrar_Rutinas.php"); // ruta a tu archivo PHP
                const rutinas = await res.json();

                // Si el servidor mandó un error, vendrá como objeto, no como array
                if (rutinas.error) {
                    lista.innerHTML = `<p class="text-center text-red-500 mt-8">Error: ${rutinas.error}</p>`;
                    return;
                }

                // Esto evita el error "forEach is not a function" por completo
                if (!Array.isArray(rutinas)) {
                    console.error("Se esperaba un array pero se recibió:", rutinas);
                    return;
                }

                if (!rutinas || rutinas.length === 0) {
                    lista.innerHTML = "<p class='text-center text-gray-500 mt-8'>No hay rutinas disponibles.</p>";
                    return;
                }

                lista.innerHTML = "";

// Elimina la línea incompleta "rutinas.forEach" y pega todo esto:
      rutinas.forEach(rutina => {
                    let nivel = Math.round(rutina.promedio_dificultad || 0);
                    let dificultadTexto = "S/D";
                    let dificultadClase = "bg-gray-100 text-gray-600";

                    if (nivel >= 1 && nivel <= 3) {
                        dificultadTexto = "PRINCIPIANTE (" + nivel + "/10)";
                        dificultadClase = "bg-green-100 text-green-700 border-green-200";
                    } else if (nivel >= 4 && nivel <= 6) {
                        dificultadTexto = "INTERMEDIO (" + nivel + "/10)";
                        dificultadClase = "bg-yellow-100 text-yellow-700 border-yellow-200";
                    } else if (nivel >= 7 && nivel <= 10) {
                        dificultadTexto = "AVANZADO (" + nivel + "/10)";
                        dificultadClase = "bg-red-100 text-red-700 border-red-200";
                    }

                    // Generar etiquetas de músculos
                    const musculosHTML = rutina.musculos 
                        ? rutina.musculos.split(', ').map(m => `<span class="tag-muscle">${m}</span>`).join('') 
                        : '<span class="tag-muscle">General</span>';

                    // Generar etiquetas de herramientas
                    const herramientasHTML = rutina.herramientas 
                        ? rutina.herramientas.split(', ').map(h => `<span class="tag-tool">${h}</span>`).join('') 
                        : '';

                    lista.innerHTML += `
                        <div class="bg-white dark:bg-black/10 p-4 rounded-xl shadow-sm border-l-4 mb-4" style="border-left-color: ${rutina.color}">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <div class="w-12 h-12 rounded-lg flex items-center justify-center text-white" style="background-color: ${rutina.color}">
                                        <span class="material-symbols-outlined">${rutina.icono}</span>
                                    </div>
                                    <div>
                                        <div class="flex items-center gap-2 mb-2">
                                            <h3 class="font-bold text-lg text-gray-900 dark:text-white">${rutina.nom_rutina}</h3>
                                            <span class="px-2 py-0.5 text-[10px] font-bold uppercase rounded-full border ${dificultadClase}">
                                                ${dificultadTexto}
                                            </span>
                                        </div>
                                        <div class="flex flex-wrap gap-1">
                                            ${musculosHTML}
                                            ${herramientasHTML}
                                        </div>
                                    </div>
                                </div>
                                <span class="material-symbols-outlined text-gray-400">chevron_right</span>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                lista.innerHTML = "<p class='text-center text-red-500 mt-8'>Error al cargar las rutinas.</p>";
                console.error("Error al cargar:", error);
            }
        }

        // Ejecutar la carga de datos
        document.addEventListener("DOMContentLoaded", cargarRutinas);
    </script>
